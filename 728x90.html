<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="animation.css" />
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="728x90.css" />
        <title>728x90</title>
    </head>
    <body>
        <div id="animation">
            <div id="frames">
                <div class="frame frame-0" data-logo="THD logo" data-cta="Shop Now">
                    <div class="text text-0" data-step="1"></div>
                    <div class="text text-1" data-step="2"></div>
                    <div class="text text-2" data-step="3"></div>
                </div>

                <div class="frame frame-1" data-logo="THD logo" data-cta="Shop Now" data-location-white>
                    <div class="text text-0" data-step="1"></div>
                    <div class="text text-1" data-step="2"></div>
                </div>

                <div class="frame frame-2" data-logo="THD logo" data-cta="Shop Now">
                    <div class="text text-0" data-step="1"></div>
                </div>

                <div class="frame frame-3" data-logo="THD logo" data-cta="Learn More">
                    <div class="text text-0" data-step="1"></div>
                    <div class="text text-1" data-step="2"></div>
                </div>
            </div>

            <div id="logos">
                <div class="logo" data-title="THD logo"></div>
            </div>

            <div id="cta-buttons">
                <div class="cta" data-title="Shop Now"></div>
                <div class="cta" data-title="Learn More"></div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
